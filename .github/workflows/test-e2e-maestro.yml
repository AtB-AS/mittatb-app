name: E2E tests with Maestro
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Define branch to test'
        required: true
        default: 'master'
  schedule:
    - cron: '0 3 * * 1-5'

permissions:
  contents: read

jobs:
  check-builds:
    name: Check for builds
    runs-on: ubuntu-latest
    environment: atb
    outputs:
      APK_IS_AVAILABLE: ${{ steps.check-output.outputs.APK_IS_AVAILABLE}}
      TESTED_VERSION: ${{ steps.check-output.outputs.TESTED_VERSION}}
      APK_DOWNLOAD_URL: ${{ steps.check-output.outputs.APK_DOWNLOAD_URL}}
    steps:
      # Setup
      - name: Set env variables
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'master' }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'
      - name: Install Python packages
        run: |
          pip install -r e2e/firestore/requirements.txt
      # Check for APK built today
      - name: Check for Firebase AppDistribution APK
        id: check-appdistribution-apk
        run: python check-appdistribution-apk.py
        working-directory: e2e/firestore
        env:
          CREDENTIALS_APITESTER: ${{ secrets.CREDENTIALS_APITESTER }}
          IS_GITHUB: 'True'
      - name: APK output
        id: check-output
        run: |
          echo "APK_IS_AVAILABLE=${{ env.APK_IS_AVAILABLE }}" >> $GITHUB_OUTPUT
          echo "TESTED_VERSION=${{ env.TESTED_VERSION }}" >> $GITHUB_OUTPUT
          echo "APK_DOWNLOAD_URL=${{ env.APK_DOWNLOAD_URL }}" >> $GITHUB_OUTPUT

  run_tests:
    needs: check-builds
    if: needs.check-builds.outputs.APK_IS_AVAILABLE == 'true'
    name: Run E2E tests
    runs-on: ubuntu-latest
    environment: atb
    timeout-minutes: 90
    env:
      ENV_API_LEVEL: 30
      ENV_SYSTEM_IMAGE: default
    steps:
      # Setup
      - name: Set env variables
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'master' }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'
      - name: Install Python packages
        run: |
          pip install -r e2e/firestore/requirements.txt
      - name: Clean up runner
        uses: ./.github/actions/android-build-cleanup-runner
      # Download APK
      - name: Get Firebase AppDistribution APK
        id: get-appdistribution-apk
        run: python get-appdistribution-apk.py
        working-directory: e2e/firestore
        env:
          CREDENTIALS_APITESTER: ${{ secrets.CREDENTIALS_APITESTER }}
          TESTED_VERSION: ${{ needs.check-builds.outputs.TESTED_VERSION }}
          APK_DOWNLOAD_URL: ${{ needs.check-builds.outputs.APK_DOWNLOAD_URL }}

      # E2E init
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Add Entur private registry credentials
        run: bash ./scripts/add-entur-private-registry.sh
        env:
          ENTUR_REGISTRY_USER: ${{ vars.ENTUR_REGISTRY_USER }}
          ENTUR_REGISTRY_TOKEN: ${{ secrets.ENTUR_REGISTRY_TOKEN }}
      - uses: pnpm/action-setup@v4
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          export PATH="$PATH:$HOME/.maestro/bin"

      # Emulator cache
      - name: Gradle cache
        if: env.ENV_SYSTEM_IMAGE == 'default'
        uses: gradle/actions/setup-gradle@v3
      - name: AVD cache
        if: env.ENV_SYSTEM_IMAGE == 'default'
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-pixel_5-${{ env.ENV_SYSTEM_IMAGE }}-${{ env.ENV_API_LEVEL }}
      - name: create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true' || env.ENV_SYSTEM_IMAGE != 'default'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          avd-name: emulator-${{ env.ENV_SYSTEM_IMAGE }}-api${{ env.ENV_API_LEVEL }}
          api-level: ${{ env.ENV_API_LEVEL }}
          arch: x86_64
          target: ${{ env.ENV_SYSTEM_IMAGE }}
          profile: pixel_5
          emulator-build: 12414864
          emulator-boot-timeout: 900
          disable-spellchecker: true
          script: echo "Generated AVD snapshot for caching."

      # E2E run
      - name: Run tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          avd-name: emulator-api${{ env.ENV_API_LEVEL }}
          api-level: ${{ env.ENV_API_LEVEL }}
          arch: x86_64
          target: ${{ env.ENV_SYSTEM_IMAGE }}
          profile: pixel_5
          emulator-build: 12414864
          emulator-boot-timeout: 900
          disable-spellchecker: true
          script: adb install ${{ github.workspace }}/e2e/apk/app-staging.apk && maestro test -e APP_ID=no.mittatb.staging --test-output-dir results --format junit --output results/results.xml tests/*
          working-directory: e2e/maestro

      # Slack (see test-e2e-android.yml)

      # Results (see test-e2e-android.yml)

      # Upload results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ./e2e/maestro/results/results.xml
          retention-days: 3

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: ./e2e/maestro/results/screenshots/*.png
          retention-days: 3
